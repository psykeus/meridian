version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: meridian_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meridian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meridian}
      POSTGRES_DB: ${POSTGRES_DB:-meridian}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meridian}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meridian_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: meridian_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-meridian}:${POSTGRES_PASSWORD:-meridian}@db:5432/${POSTGRES_DB:-meridian}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  collab:
    build:
      context: ./apps/collab
      dockerfile: Dockerfile
    container_name: meridian_collab
    restart: unless-stopped
    environment:
      PORT: 1234
      REDIS_URL: redis://redis:6379
    ports:
      - "1234:1234"
    depends_on:
      redis:
        condition: service_healthy

  ai:
    build:
      context: ./apps/ai
      dockerfile: Dockerfile
    container_name: meridian_ai
    restart: unless-stopped
    env_file: .env
    environment:
      CORS_ORIGINS: http://localhost:5173
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    ports:
      - "8001:8001"
    depends_on:
      - api
    volumes:
      - ./apps/ai:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: meridian_web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://api:8000
      VITE_WS_URL: http://api:8000
      VITE_AI_URL: http://ai:8001
      VITE_COLLAB_URL: ws://collab:1234
    ports:
      - "5173:5173"
    depends_on:
      - api
      - ai
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  db_data:
  redis_data:
